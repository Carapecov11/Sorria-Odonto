<!DOCTYPE html>
<html>
<head>
  <title>Agendar</title>
  <link rel="stylesheet" href="./Css/Style.css">
    <link rel="icon" type="image/png" href="./Img/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="./Imagens/favicon.ico" />
    <link rel="shortcut icon" href="./Imagens/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="./Imagens/apple-touch-icon.png" />
    <link rel="manifest" href="./Imagens/site.webmanifest" />
</head>
<body>

<nav>
  <div class="logo-area">
    <img src="./Imagens/Logo.png" alt="Logo SorrIA">
    <h1>SORRIA!</h1>
  </div>
  <a href="DashBoard.html">Início</a>
  <a href="pacientes.html">Pacientes</a>
  <a href="agendar.html">Agenda</a>
  <a href="horários.html">Horários</a>
  <a href="orcamento.html">Orçamento</a>
  <a href="dentistas.html">Dentistas</a>
  <a href="estoque.html">Estoque</a>
  <button class="btn-logout" onclick="logout()">Sair</button>
</nav>

<div class="container">
  <h2>Agendar Consulta</h2>

  <select id="pacienteConsulta">
    <option value="">Selecione um paciente</option>
  </select>
  <select id="dentistaConsulta">
    <option value="">Selecione o Dentista</option>
  </select>
  <input type="text" id="procedimentoConsulta" placeholder="Procedimento (ex: Limpeza)">
  <input type="date" id="dataConsulta">
  <input type="time" id="horaConsulta">
  <input type="number" id="valorConsulta" placeholder="Valor da consulta (R$)">
  <select id="pagamentoConsulta">
    <option value="">Forma de pagamento</option>
    <option value="Dinheiro">Dinheiro</option>
    <option value="Débito">Cartão de Débito</option>
    <option value="Crédito">Cartão de Crédito</option>
    <option value="Pix">Pix</option>
  </select>

  <button type="button" onclick="agendar()">Agendar</button>

  <h3>Consultas</h3>
  <ul id="listaConsultas"></ul>
  <button class="btn-delete" onclick="limparConsultas()">
  Limpar todas as consultas
</button>
</div>

<script src="./Js/script.Js"></script>
</body>
</html>
