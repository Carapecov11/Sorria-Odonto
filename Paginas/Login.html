<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - SorrIA</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Contrail+One&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./Css/Login.css">
  <link rel="icon" type="image/png" href="./Imagens/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="./Imagens/favicon.ico" />
  <link rel="shortcut icon" href="./Imagens/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="./Imagens/apple-touch-icon.png" />
  <link rel="manifest" href="./Imagens/site.webmanifest" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Contrail+One&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Orbitron:wght@400..900&family=Oxanium:wght@200..800&display=swap');
  </style>
  
</head>

<body>

<div class="login-wrapper">

  <div class="login-left">
  </div>

  <!-- DIREITA -->
  <div class="login-card">
    <h2>LOGIN</h2>

    <label>Usuário</label>
    <input type="text" id="user" placeholder="Usuário">

    <label>Senha</label>
    <input type="password" id="pass" placeholder="Senha">

    <div class="link">Recuperar senha?</div>

    <button type="button" onclick="login()">LOGIN</button>
  </div>

</div>

<script src="./Js/script.Js"></script>

</body>
</html>
